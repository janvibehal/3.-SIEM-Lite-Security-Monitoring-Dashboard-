version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: siem-backend

    restart: unless-stopped

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - postgres
      - rabbitmq

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: siem-frontend

    restart: unless-stopped

    ports:
      - "5173:5173"

    environment:
      VITE_API_URL: http://localhost:5000

    depends_on:
      - backend

  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile

    container_name: siem-analytics

    restart: unless-stopped

    volumes:
      - ./analytics:/app

    depends_on:
      - postgres
      - rabbitmq
  
  postgres:
    image: postgres:16

    container_name: siem-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: siem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management

    container_name: siem-rabbitmq

    restart: unless-stopped

    ports:
      - "5672:5672"
      - "15672:15672"

    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  nginx:
    image: nginx:latest

    container_name: siem-nginx

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - frontend
      - backend

volumes:
  rabbitmq_data:
  postgres_data: