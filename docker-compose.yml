version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: siem-backend

    restart: unless-stopped

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - rabbitmq

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: siem-frontend

    restart: unless-stopped

    ports:
      - "5173:5173"

    environment:
      VITE_API_URL: http://localhost:5000

    depends_on:
      - backend

  rabbitmq:
    image: rabbitmq:3-management

    container_name: siem-rabbitmq

    restart: unless-stopped

    ports:
      - "5672:5672"
      - "15672:15672"

    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  rabbitmq_data: